<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>뜯어먹는 중학 영단어 1800</title>
<style>
:root{
  --green:#2e7d32;
  --green-light:#43a047;
  --green-bg:#f1f8f1;
  --green-card:#e8f5e9;
  --green-border:#c8e6c9;
  --yellow:#f9a825;
  --red:#e53935;
  --text:#1b2e1b;
  --text2:#4a6449;
  --text3:#8aab88;
  --white:#fff;
  --shadow:0 2px 12px rgba(46,125,50,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--green-bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif}

/* ── 공통 헤더 ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:var(--green);
  padding:0 16px;
  height:52px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.hdr-back{
  background:rgba(255,255,255,0.18);
  border:none;color:#fff;
  width:34px;height:34px;
  border-radius:10px;
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.hdr-title{
  font-size:1rem;font-weight:700;color:#fff;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ══════════════════════════════
   홈 화면
══════════════════════════════ */
#homeScreen{display:block}
.home-hero{
  background:var(--green);
  padding:28px 20px 32px;
  text-align:center;
  color:#fff;
}
.home-badge{
  display:inline-block;
  background:rgba(255,255,255,0.18);
  border-radius:20px;
  padding:4px 14px;
  font-size:0.72rem;font-weight:700;
  letter-spacing:1px;
  margin-bottom:12px;
}
.home-title{
  font-size:1.55rem;font-weight:900;
  line-height:1.3;margin-bottom:6px;
}
.home-sub{
  font-size:0.82rem;opacity:0.78;
}
.home-body{padding:20px 16px 40px;}
.section-label{
  font-size:0.7rem;font-weight:700;
  letter-spacing:2px;color:var(--text3);
  text-transform:uppercase;
  margin-bottom:12px;margin-top:4px;
}
.day-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:28px;
}
.day-card{
  background:var(--white);
  border:1.5px solid var(--green-border);
  border-radius:12px;
  padding:10px 4px;
  text-align:center;
  cursor:pointer;
  transition:all 0.15s;
  box-shadow:var(--shadow);
}
.day-card:active{transform:scale(0.94);background:var(--green-card);}
.day-card-num{
  font-size:0.65rem;color:var(--text3);
  font-weight:600;margin-bottom:2px;
}
.day-card-label{
  font-size:0.95rem;font-weight:800;color:var(--green);
}
.home-footer{
  text-align:center;padding:20px 0 8px;
  font-size:0.72rem;font-weight:700;
  color:var(--text3);letter-spacing:1px;
}

/* ══════════════════════════════
   단어 화면
══════════════════════════════ */
#studyScreen{display:none;}

/* 모드 탭 */
.mode-tabs{
  display:flex;gap:0;
  background:var(--white);
  border-bottom:2px solid var(--green-border);
}
.mode-tab{
  flex:1;
  padding:12px 4px;
  border:none;background:transparent;
  font-size:0.75rem;font-weight:700;
  color:var(--text3);cursor:pointer;
  white-space:nowrap;text-align:center;
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:all 0.15s;
}
.mode-tab.active{color:var(--green);border-bottom-color:var(--green);}

/* 툴바 */
.toolbar{
  display:flex;gap:8px;padding:10px 14px;
  background:var(--green-bg);
  border-bottom:1px solid var(--green-border);
  align-items:center;
  overflow-x:auto;scrollbar-width:none;
}
.toolbar::-webkit-scrollbar{display:none}
.tool-btn{
  flex:0 0 auto;
  background:var(--white);
  border:1.5px solid var(--green-border);
  color:var(--text2);
  padding:7px 13px;border-radius:20px;
  font-size:0.78rem;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:all 0.15s;
}
.tool-btn.on{background:var(--green);color:#fff;border-color:var(--green);}
.spacer{flex:1;min-width:4px;}
.shuffle-btn{
  flex:0 0 auto;
  background:var(--text);color:#fff;
  border:none;padding:7px 14px;border-radius:20px;
  font-size:0.78rem;font-weight:700;cursor:pointer;
}

/* 단어 목록 */
.word-list{padding:10px 14px 100px;}
.word-item{
  background:var(--white);
  border:1.5px solid var(--green-border);
  border-radius:14px;
  padding:14px 14px;
  margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
}
.word-eng{
  font-size:1.05rem;font-weight:800;
  color:var(--text);flex:0 0 auto;
  min-width:110px;max-width:140px;
  letter-spacing:-0.3px;
}
.word-eng.blur span.eng-txt{
  color:transparent;background:#ddd;border-radius:6px;user-select:none;
  display:inline-block;width:80px;height:1.1em;vertical-align:middle;
}
.word-kor{
  font-size:0.85rem;color:var(--text2);
  line-height:1.45;flex:1;
}
.word-kor.blur{
  color:transparent;background:#ddd;border-radius:6px;user-select:none;
  display:inline-block;width:120px;height:1em;vertical-align:middle;
}
.spk-btn{
  flex:0 0 34px;height:34px;
  background:var(--green-card);
  border:none;border-radius:10px;
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--green);
}
.spk-btn.playing{background:var(--green);color:#fff;}


/* 탭하여 보기 */
.reveal-btn{
  display:none;
  background:var(--green-card);
  border:1.5px solid var(--green-border);
  color:var(--green);
  font-size:0.72rem;font-weight:700;
  padding:4px 10px;border-radius:20px;
  cursor:pointer;white-space:nowrap;
  flex:0 0 auto;
}
.word-item.has-hidden .reveal-btn{display:inline-flex;align-items:center;}
.word-item.revealed .word-eng.blur span.eng-txt,
.word-item.revealed .word-kor.blur{
  color:var(--text)!important;background:transparent!important;
  width:auto!important;height:auto!important;
}

/* ── 플래시카드 ── */
#fcPane{display:none;padding:16px 16px 100px;}
.fc-progress-wrap{
  background:var(--green-border);
  border-radius:4px;height:5px;
  margin-bottom:10px;overflow:hidden;
}
.fc-progress-bar{
  height:100%;background:var(--green);
  border-radius:4px;transition:width 0.3s;
}
.fc-counter{
  text-align:right;font-size:0.75rem;
  color:var(--text3);font-weight:600;
  margin-bottom:14px;
}
.fc-card{
  width:100%;min-height:220px;
  perspective:1000px;cursor:pointer;
  margin-bottom:20px;
}
.fc-inner{
  width:100%;min-height:220px;
  position:relative;transform-style:preserve-3d;
  transition:transform 0.45s cubic-bezier(.4,0,.2,1);
}
.fc-card.flipped .fc-inner{transform:rotateY(180deg);}
.fc-face{
  position:absolute;width:100%;min-height:220px;
  backface-visibility:hidden;
  background:var(--white);
  border:2px solid var(--green-border);
  border-radius:20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:28px 24px;
  box-shadow:var(--shadow);
}
.fc-face.back{
  transform:rotateY(180deg);
  background:var(--green-card);
  border-color:var(--green);
}
.fc-hint{font-size:0.65rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.fc-word{font-size:2rem;font-weight:900;color:var(--text);text-align:center;letter-spacing:-0.5px;}
.fc-meaning{font-size:1.1rem;color:var(--text);text-align:center;line-height:1.6;font-weight:600;}
.fc-tap{font-size:0.72rem;color:var(--text3);margin-top:14px;}
.fc-spk{
  position:absolute;bottom:14px;right:14px;
  background:var(--green-card);border:none;
  width:36px;height:36px;border-radius:12px;
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.fc-nav{display:flex;gap:12px;justify-content:center;align-items:center;}
.fc-nav-btn{
  background:var(--white);
  border:2px solid var(--green-border);
  color:var(--text);
  width:52px;height:52px;border-radius:14px;
  font-size:1.3rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);
}
.fc-nav-btn:disabled{opacity:0.3;}
.fc-shuffle{
  background:var(--green);color:#fff;
  border:none;padding:0 22px;height:52px;
  border-radius:14px;font-size:0.85rem;font-weight:700;cursor:pointer;
}

/* ── 퀴즈 / 뜻 객관식 공통 ── */
#quizPane,#meaningPane{display:none;padding:14px 14px 100px;}
.score-row{display:flex;gap:8px;margin-bottom:14px;}
.score-box{
  flex:1;background:var(--white);
  border:1.5px solid var(--green-border);
  border-radius:12px;padding:10px 6px;
  text-align:center;box-shadow:var(--shadow);
}
.score-n{font-size:1.5rem;font-weight:900;}
.score-n.g{color:var(--green)}
.score-n.r{color:var(--red)}
.score-n.b{color:var(--yellow)}
.score-l{font-size:0.65rem;color:var(--text3);font-weight:600;margin-top:2px;}
.quiz-q-box{
  background:var(--white);
  border:1.5px solid var(--green-border);
  border-radius:16px;padding:22px 18px;
  margin-bottom:14px;text-align:center;
  box-shadow:var(--shadow);
}
.quiz-qlabel{font-size:0.65rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.quiz-qword{
  font-size:2rem;font-weight:900;color:var(--text);
  letter-spacing:-0.5px;
}
.quiz-qkor{font-size:1rem;color:var(--text2);margin-top:6px;font-weight:600;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.qopt{
  background:var(--white);
  border:2px solid var(--green-border);
  color:var(--text);
  padding:14px 10px;border-radius:12px;
  font-size:0.85rem;font-weight:600;
  text-align:left;cursor:pointer;
  line-height:1.4;
  transition:all 0.15s;
  box-shadow:var(--shadow);
}
.qopt:active:not(:disabled){transform:scale(0.97);}
.qopt.correct{border-color:var(--green);background:#e8f5e9;color:var(--green);}
.qopt.wrong{border-color:var(--red);background:#ffebee;color:var(--red);}
.qopt:disabled{cursor:default;}
.next-q-btn{
  width:100%;background:var(--green);
  border:none;color:#fff;
  padding:15px;border-radius:14px;
  font-size:0.95rem;font-weight:700;cursor:pointer;
  display:none;
}
.next-q-btn.show{display:block;}

/* ── 스펠링 ── */
#spellPane{display:none;padding:14px 14px 100px;}
.spell-q-box{
  background:var(--white);
  border:1.5px solid var(--green-border);
  border-radius:16px;padding:22px 18px;
  margin-bottom:14px;text-align:center;
  box-shadow:var(--shadow);
}
.spell-prompt{font-size:0.7rem;color:var(--text3);margin-bottom:8px;letter-spacing:1px;}
.spell-word{font-size:1rem;font-weight:600;color:var(--text2);line-height:1.5;}
.spell-input{
  width:100%;background:var(--white);
  border:2px solid var(--green-border);
  color:var(--text);
  padding:14px 16px;border-radius:12px;
  font-size:1.05rem;font-weight:700;
  outline:none;text-align:center;
  margin-bottom:10px;
  transition:border-color 0.2s;
}
.spell-input:focus{border-color:var(--green);}
.spell-input.ok{border-color:var(--green);background:#e8f5e9;}
.spell-input.ng{border-color:var(--red);background:#ffebee;}
.spell-fb{min-height:22px;font-size:0.82rem;text-align:center;margin-bottom:10px;font-weight:600;}
.spell-fb.ok{color:var(--green);}
.spell-fb.ng{color:var(--red);}
.spell-submit{
  width:100%;background:var(--text);
  border:none;color:#fff;
  padding:15px;border-radius:14px;
  font-size:0.95rem;font-weight:700;cursor:pointer;
}

/* ── 결과 화면 ── */
.result-box{
  display:none;
  background:var(--white);
  border:2px solid var(--green-border);
  border-radius:20px;
  padding:36px 24px;
  text-align:center;
  box-shadow:var(--shadow);
  margin-top:16px;
}
.result-box.show{display:block;}
.result-em{font-size:3rem;margin-bottom:12px;}
.result-title{font-size:1.6rem;font-weight:900;color:var(--green);margin-bottom:6px;}
.result-sub{font-size:0.9rem;color:var(--text2);margin-bottom:22px;}
.retry-btn{
  background:var(--green-card);
  border:2px solid var(--green-border);
  color:var(--green);
  padding:12px 28px;border-radius:12px;
  font-size:0.9rem;font-weight:700;cursor:pointer;
}

/* ── 애니메이션 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.word-item{animation:fadeUp 0.2s ease both;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake 0.3s ease;}

/* ── 데이 네비 (하단) ── */
.day-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);
  border-top:1.5px solid var(--green-border);
  padding:10px 14px 14px;
  display:flex;gap:8px;align-items:center;
  z-index:50;
}
.day-nav-prev,.day-nav-next{
  flex:0 0 44px;height:44px;
  background:var(--green-card);
  border:1.5px solid var(--green-border);
  border-radius:12px;
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--green);font-weight:700;
}
.day-nav-prev:disabled,.day-nav-next:disabled{opacity:0.3;}
.day-nav-label{
  flex:1;text-align:center;
  font-size:0.9rem;font-weight:800;color:var(--green);
}

/* ── 랜덤 테스트 ── */
#randomPane{display:none;padding:14px 14px 100px;}
.rand-toolbar{
  display:flex;gap:8px;padding:0 0 12px;
  align-items:center;flex-wrap:wrap;
}
.rand-submit-all{
  background:var(--green);color:#fff;
  border:none;padding:10px 20px;border-radius:20px;
  font-size:0.85rem;font-weight:700;cursor:pointer;
}
.rand-list{display:flex;flex-direction:column;gap:10px;}
.rand-item{
  background:var(--white);
  border:1.5px solid var(--green-border);
  border-radius:14px;
  padding:14px;
  box-shadow:var(--shadow);
}
.rand-item.correct{background:#f0fff4;border-color:var(--green);}
.rand-item.wrong{background:#fff5f5;border-color:var(--red);}
.rand-type{
  font-size:0.65rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--text3);
  font-weight:700;margin-bottom:6px;
}
.rand-given{
  font-size:1rem;font-weight:700;color:var(--text);
  margin-bottom:8px;line-height:1.4;
}
.rand-input{
  width:100%;background:var(--green-bg);
  border:1.5px solid var(--green-border);
  color:var(--text);padding:10px 12px;
  border-radius:10px;font-size:0.95rem;
  font-weight:600;outline:none;
  transition:border-color 0.2s;
}
.rand-input:focus{border-color:var(--green);}
.rand-input.ok{border-color:var(--green);background:#e8f5e9;color:var(--green);}
.rand-input.ng{border-color:var(--red);background:#ffebee;}
.rand-input:disabled{opacity:1;}
.rand-answer{
  display:none;margin-top:6px;
  font-size:0.8rem;color:var(--red);font-weight:700;
}
.rand-answer.show{display:block;}
.rand-result-row{
  display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
</style>
</head>
<body>

<!-- ══ 홈 화면 ══ -->
<div id="homeScreen">
  <div class="home-hero">
    <div class="home-badge">60일 완성</div>
    <div class="home-title">뜯어먹는<br>중학 영단어 1800</div>
    <div class="home-sub">Day를 선택해서 학습을 시작하세요</div>
  </div>
  <div class="home-body">
    <div class="section-label">Day 선택</div>
    <div class="day-grid" id="dayGrid"></div>
    <div class="home-footer">ENCHOOL</div>
  </div>
</div>

<!-- ══ 학습 화면 ══ -->
<div id="studyScreen">
  <div class="hdr">
    <button class="hdr-back" onclick="goHome()">‹</button>
    <div class="hdr-title" id="studyTitle">Day 1</div>
  </div>

  <!-- 모드 탭 -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="list"    onclick="switchMode('list')">목록</button>
    <button class="mode-tab"        data-mode="meaning" onclick="switchMode('meaning')">단어 뜻</button>
    <button class="mode-tab"        data-mode="spell"   onclick="switchMode('spell')">스펠링</button>
    <button class="mode-tab"        data-mode="random"  onclick="switchMode('random')">랜덤 테스트</button>
    <button class="mode-tab"        data-mode="fc"      onclick="switchMode('fc')">플래시 카드</button>
  </div>

  <!-- 목록 모드 -->
  <div id="listPane">
    <div class="toolbar">
      <button class="tool-btn" id="tKor" onclick="toggleKor()">한국어 숨기기</button>
      <button class="tool-btn" id="tEng" onclick="toggleEng()">영어 숨기기</button>
      <div class="spacer"></div>
      <button class="shuffle-btn" onclick="shuffleList()">🔀 셔플</button>
    </div>
    <div class="word-list" id="wordList"></div>
  </div>


  <!-- 랜덤 테스트 -->
  <div id="randomPane">
    <div class="rand-toolbar">
      <div style="font-size:0.8rem;color:var(--text3);font-weight:600;flex:1;">
        단어·뜻이 무작위로 섞여서 출제돼요
      </div>
      <button class="rand-submit-all" onclick="submitRandom()">채점하기</button>
    </div>
    <div class="score-row" id="randScoreRow" style="display:none;margin-bottom:14px;">
      <div class="score-box"><div class="score-n g" id="randC">0</div><div class="score-l">정답</div></div>
      <div class="score-box"><div class="score-n r" id="randW">0</div><div class="score-l">오답</div></div>
    </div>
    <div class="rand-list" id="randList"></div>
    <div class="result-box" id="randResult" style="margin-top:16px;">
      <div class="result-em" id="randEm">🎲</div>
      <div class="result-title">완료!</div>
      <div class="result-sub" id="randSub"></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px;">
        <button class="retry-btn" onclick="startRandom()">전체 다시 풀기</button>
        <button class="retry-btn" id="randRetryWrong" onclick="retryWrongRandom()" style="background:var(--red);border-color:var(--red);color:#fff;display:none;">틀린 단어만 다시 풀기</button>
      </div>
    </div>
  </div>

  <!-- 플래시카드 모드 -->
  <div id="fcPane">
    <div class="fc-progress-wrap"><div class="fc-progress-bar" id="fcBar"></div></div>
    <div class="fc-counter" id="fcCounter">1 / 30</div>
    <div class="fc-card" id="fcCard" onclick="flipFC()">
      <div class="fc-inner" id="fcInner">
        <div class="fc-face front">
          <div class="fc-hint">ENGLISH</div>
          <div class="fc-word" id="fcWord"></div>
          <div class="fc-tap">탭하여 뒤집기</div>
          <button class="fc-spk" onclick="spkFC(event)">🔊</button>
        </div>
        <div class="fc-face back">
          <div class="fc-hint">한국어 뜻</div>
          <div class="fc-meaning" id="fcMeaning"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" id="fcPrev" onclick="fcMove(-1)">◀</button>
      <button class="fc-shuffle" onclick="fcShuffle()">🔀 셔플</button>
      <button class="fc-nav-btn" id="fcNext" onclick="fcMove(1)">▶</button>
    </div>
  </div>

  <!-- 뜻 퀴즈 (뜻→영어 객관식) -->

let randItems = [];   // {item, type:'eng'|'kor'} 
let randWrongItems = [];
let randGraded = false;

function startRandom(list){
  const src = list || curList;
  // 각 단어마다 랜덤으로 eng(뜻 보고 영어 입력) 또는 kor(영어 보고 뜻 입력) 결정
  randItems = shuffle([...src]).map(item=>({
    item,
    type: Math.random() < 0.5 ? 'eng' : 'kor'
  }));
  randGraded = false;
  randWrongItems = [];
  document.getElementById('randResult').classList.remove('show');
  document.getElementById('randScoreRow').style.display = 'none';
  document.getElementById('randRetryWrong').style.display = 'none';
  renderRandom();
}

function renderRandom(){
  const container = document.getElementById('randList');
  container.innerHTML = randItems.map((r,i) => {
    const {item, type} = r;
    const given  = type==='kor' ? item.w : item.m; // 보여줄 것
    const typeLabel = type==='kor' ? '영어 단어를 입력하세요' : '한국어 뜻을 입력하세요';
    const placeholder = type==='kor' ? '영어 입력...' : '뜻 입력...';
    return `
      <div class="rand-item" id="ri-${i}">
        <div class="rand-type">${typeLabel}</div>
        <div class="rand-given">${given}</div>
        <input class="rand-input" id="ri-inp-${i}" 
          placeholder="${placeholder}" 
          autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'){document.getElementById('ri-inp-${Math.min(i+1, randItems.length-1)}').focus()}"
          data-idx="${i}">
        <div class="rand-answer" id="ri-ans-${i}"></div>
      </div>
    `;
  }).join('');
  // 첫 입력칸 포커스
  setTimeout(()=>{
    const first = document.getElementById('ri-inp-0');
    if(first) first.focus();
  }, 80);
}

function submitRandom(){
  if(randGraded) { startRandom(); return; }
  randGraded = true;
  randWrongItems = [];
  let correct = 0;

  randItems.forEach((r, i) => {
    const inp = document.getElementById('ri-inp-'+i);
    const row = document.getElementById('ri-'+i);
    const ansEl = document.getElementById('ri-ans-'+i);
    if(!inp) return;

    const val = inp.value.trim();
    const answer = r.type==='kor' ? r.item.w : r.item.m;

    inp.disabled = true;

    // 정답 체크 (영어: 대소문자 무시, 한국어: 공백 무시)
    const norm = s => s.toLowerCase().replace(/\s/g,'').replace(/[()[\]~]/g,'');
    // 한국어는 여러 뜻 중 하나라도 포함하면 정답
    let isCorrect = false;
    if(r.type==='kor'){
      isCorrect = norm(val) === norm(answer);
    } else {
      // 뜻은 쉼표로 구분된 여러 뜻 중 하나라도 일치하면 OK
      const answers = answer.split(/[,，]/).map(a=>norm(a.trim()));
      isCorrect = answers.some(a => a && norm(val).includes(a) || (a && a.includes(norm(val)) && norm(val).length > 1));
    }

    if(isCorrect){
      correct++;
      row.classList.add('correct');
      inp.classList.add('ok');
    } else {
      row.classList.add('wrong');
      inp.classList.add('ng');
      ansEl.textContent = '정답: ' + answer;
      ansEl.classList.add('show');
      randWrongItems.push(r);
    }
  });

  // 점수 표시
  const total = randItems.length;
  const pct = Math.round(correct/total*100);
  document.getElementById('randScoreRow').style.display = 'flex';
  document.getElementById('randC').textContent = correct;
  document.getElementById('randW').textContent = total - correct;
  document.getElementById('randEm').textContent = pct>=80?'🎉':pct>=50?'👍':'💪';
  document.getElementById('randSub').textContent = `${total}문제 중 ${correct}개 정답 (${pct}%)`;
  document.getElementById('randResult').classList.add('show');

  if(randWrongItems.length > 0){
    const btn = document.getElementById('randRetryWrong');
    btn.style.display = 'inline-block';
    btn.textContent = `틀린 ${randWrongItems.length}단어 다시 풀기`;
  }

  // 틀린 문제로 스크롤
  const firstWrong = document.querySelector('.rand-item.wrong');
  if(firstWrong) firstWrong.scrollIntoView({behavior:'smooth', block:'center'});
}

function retryWrongRandom(){
  // 틀린 단어들만 뽑아서 새로 시작
  const wrongSrc = randWrongItems.map(r=>r.item);
  startRandom(wrongSrc);
}

// ════════════════════════════════════
//  HOME
// ════════════════════════════════════
function buildHome(){
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = DAYS.map((d,i)=>`
    <div class="day-card" onclick="openDay('${d}')">
      <div class="day-card-num">Day</div>
      <div class="day-card-label">${i+1}</div>
    </div>
  `).join('');
}

function openDay(day){
  curDay = day;
  curList = [...VOCAB[day]];
  dispList = [...curList];
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('studyScreen').style.display = 'block';
  document.getElementById('studyTitle').textContent = day;
  document.getElementById('dnLabel').textContent = day;
  updateDayNav();
  switchMode('list');
  window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('studyScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'block';
  window.scrollTo(0,0);
}

function changeDay(dir){
  const idx = DAYS.indexOf(curDay);
  const next = idx + dir;
  if(next < 0 || next >= DAYS.length) return;
  openDay(DAYS[next]);
}

function updateDayNav(){
  const idx = DAYS.indexOf(curDay);
  document.getElementById('dnPrev').disabled = idx === 0;
  document.getElementById('dnNext').disabled = idx === DAYS.length - 1;
  document.getElementById('dnLabel').textContent = curDay;
}

// ════════════════════════════════════
//  MODE SWITCH
// ════════════════════════════════════
function switchMode(mode){
  ['listPane','fcPane','meaningPane','spellPane','randomPane'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');

  const paneId = mode==='list'?'listPane':mode==='fc'?'fcPane':mode+'Pane';
  document.getElementById(paneId).style.display='block';

  if(mode==='list')    renderList();
  if(mode==='fc')      startFC();
  if(mode==='meaning') startMeaning();
  if(mode==='spell')   startSpell();
  if(mode==='random')  startRandom();
}

// ════════════════════════════════════
//  LIST MODE
// ════════════════════════════════════
function renderList(){
  const list = document.getElementById('wordList');
  list.innerHTML = dispList.map((item,i)=>`
    <div class="word-item${(hideEng||hideKor)?' has-hidden':''}" style="animation-delay:${Math.min(i*0.02,0.4)}s" id="wi-${i}">
      <div class="word-eng${hideEng?' blur':''}">
        <span class="eng-txt">${item.w}</span>
      </div>
      <div class="word-kor${hideKor?' blur':''}">${item.m}</div>
      <button class="reveal-btn" onclick="revealItem(${i})">탭하여 보기</button>
      <button class="spk-btn" onclick="speak('${item.w.replace(/'/g,"\\'")}',this)">🔊</button>
    </div>
  `).join('');
}

function revealItem(i){
  const el = document.getElementById('wi-'+i);
  if(!el) return;
  if(el.classList.contains('revealed')){
    el.classList.remove('revealed');
  } else {
    el.classList.add('revealed');
  }
}

function toggleKor(){
  hideKor=!hideKor;
  document.getElementById('tKor').classList.toggle('on',hideKor);
  renderList();
}
function toggleEng(){
  hideEng=!hideEng;
  document.getElementById('tEng').classList.toggle('on',hideEng);
  renderList();
}
function shuffleList(){
  dispList = shuffle([...curList]);
  renderList();
}

// ════════════════════════════════════
//  FLASHCARD
// ════════════════════════════════════
function startFC(){
  fcList=[...curList]; fcIdx=0;
  document.getElementById('fcCard').classList.remove('flipped');
  updateFC();
}
function updateFC(){
  const card = document.getElementById('fcCard');
  const doUpdate = ()=>{
    const item = fcList[fcIdx];
    document.getElementById('fcWord').textContent = item.w;
    document.getElementById('fcMeaning').textContent = item.m;
    document.getElementById('fcCounter').textContent = `${fcIdx+1} / ${fcList.length}`;
    document.getElementById('fcBar').style.width = `${(fcIdx+1)/fcList.length*100}%`;
    document.getElementById('fcPrev').disabled = fcIdx===0;
    document.getElementById('fcNext').disabled = fcIdx===fcList.length-1;
  };
  if(card.classList.contains('flipped')){
    card.classList.remove('flipped');
    setTimeout(doUpdate, 460);
  } else {
    doUpdate();
  }
}
function flipFC(){ document.getElementById('fcCard').classList.toggle('flipped'); }
function spkFC(e){ e.stopPropagation(); speak(document.getElementById('fcWord').textContent); }
function fcMove(dir){ fcIdx=Math.max(0,Math.min(fcList.length-1,fcIdx+dir)); updateFC(); }
function fcShuffle(){ fcList=shuffle([...curList]); fcIdx=0; document.getElementById('fcCard').classList.remove('flipped'); updateFC(); }

// ════════════════════════════════════
//  MEANING QUIZ (뜻→영어 객관식)
// ════════════════════════════════════
let mWrongList = []; // 틀린 문제 저장

function startMeaning(){
  mList=shuffle([...curList]); mIdx=0; mC=0; mW=0; mWrongList=[];
  document.getElementById('mResult').classList.remove('show');
  document.getElementById('mRetryWrong').style.display='none';
  updateScores('m');
  renderM();
}
function renderM(){
  if(mIdx>=mList.length){endMeaning();return;}
  const item=mList[mIdx];
  document.getElementById('mWord').textContent=item.m;
  document.getElementById('mC').textContent=mC;
  document.getElementById('mW').textContent=mW;
  document.getElementById('mL').textContent=mList.length-mIdx;
  const opts=shuffle([item,...getRandWrong(item,3,'w')]);
  document.getElementById('mOpts').innerHTML=opts.map(o=>`
    <button class="qopt" onclick="answerM(this,'${esc(o.w)}','${esc(item.w)}',${mIdx})">${o.w}</button>
  `).join('');
  document.getElementById('mNext').classList.remove('show');
}
function answerM(btn,chosen,correct,idx){
  document.querySelectorAll('#mOpts .qopt').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct) b.classList.add('correct');
  });
  if(chosen===correct){ mC++; btn.classList.add('correct');}
  else{ mW++; btn.classList.add('wrong'); mWrongList.push(mList[idx]);}
  updateScores('m');
  document.getElementById('mNext').classList.add('show');
}
function nextQ(type){
  if(type==='meaning'){mIdx++;renderM();}
}
function endMeaning(){
  document.getElementById('mOpts').innerHTML='';
  document.getElementById('mNext').classList.remove('show');
  const r=document.getElementById('mResult');
  r.classList.add('show');
  const pct=Math.round(mC/mList.length*100);
  document.getElementById('mEm').textContent=pct>=80?'🎉':pct>=50?'👍':'💪';
  document.getElementById('mSub').textContent=`${mList.length}문제 중 ${mC}개 정답 (${pct}%)`;
  if(mWrongList.length>0){
    document.getElementById('mRetryWrong').style.display='inline-block';
    document.getElementById('mRetryWrong').textContent=`틀린 ${mWrongList.length}문제 다시 풀기`;
  }
}

// ════════════════════════════════════
//  SPELLING
// ════════════════════════════════════
let spWrongList = [];

function startSpell(){
  spList=shuffle([...curList]); spIdx=0; spC=0; spW=0; spPending=false; spWrongList=[];
  document.getElementById('spResult').classList.remove('show');
  document.getElementById('spRetryWrong').style.display='none';
  document.getElementById('spWord').closest('.spell-q-box').style.display='block';
  updateScores('sp');
  renderSpell();
}
function renderSpell(){
  if(spIdx>=spList.length){endSpell();return;}
  const item=spList[spIdx];
  document.getElementById('spWord').textContent=item.m;
  document.getElementById('spL').textContent=spList.length-spIdx;
  const inp=document.getElementById('spInput');
  inp.value=''; inp.className='spell-input';
  document.getElementById('spFb').textContent='';
  document.getElementById('spFb').className='spell-fb';
  spPending=false;
  setTimeout(()=>inp.focus(),50);
}
function submitSpell(){
  const item=spList[spIdx];
  const inp=document.getElementById('spInput');
  const val=inp.value.trim();
  if(!val) return;
  if(spPending){ spIdx++; renderSpell(); return; }
  const fb=document.getElementById('spFb');
  if(val.toLowerCase()===item.w.toLowerCase()){
    inp.className='spell-input ok';
    fb.textContent='✅ 정답!'; fb.className='spell-fb ok';
    spC++;
  } else {
    inp.className='spell-input ng';
    fb.textContent=`❌ 정답: ${item.w}`; fb.className='spell-fb ng';
    inp.classList.add('shake'); setTimeout(()=>inp.classList.remove('shake'),350);
    spW++; spWrongList.push(item);
  }
  updateScores('sp');
  spPending=true;
}
function endSpell(){
  document.getElementById('spWord').closest('.spell-q-box').style.display='none';
  const r=document.getElementById('spResult');
  r.classList.add('show');
  const pct=Math.round(spC/spList.length*100);
  document.getElementById('spSub').textContent=`${spList.length}문제 중 ${spC}개 정답 (${pct}%)`;
  if(spWrongList.length>0){
    document.getElementById('spRetryWrong').style.display='inline-block';
    document.getElementById('spRetryWrong').textContent=`틀린 ${spWrongList.length}문제 다시 풀기`;
  }
}

// 틀린 문제만 다시 풀기
function retryWrong(type){
  if(type==='meaning'){
    mList=shuffle([...mWrongList]); mIdx=0; mC=0; mW=0; mWrongList=[];
    document.getElementById('mResult').classList.remove('show');
    document.getElementById('mRetryWrong').style.display='none';
    updateScores('m');
    renderM();
  } else {
    spList=shuffle([...spWrongList]); spIdx=0; spC=0; spW=0; spPending=false; spWrongList=[];
    document.getElementById('spResult').classList.remove('show');
    document.getElementById('spRetryWrong').style.display='none';
    document.getElementById('spWord').closest('.spell-q-box').style.display='block';
    updateScores('sp');
    renderSpell();
  }
}

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function updateScores(prefix){
  if(prefix==='m'){
    document.getElementById('mC').textContent=mC;
    document.getElementById('mW').textContent=mW;
    document.getElementById('mL').textContent=Math.max(0,mList.length-mIdx);
  } else {
    document.getElementById('spC').textContent=spC;
    document.getElementById('spW').textContent=spW;
    document.getElementById('spL').textContent=Math.max(0,spList.length-spIdx);
  }
}
function getRandWrong(item,n,key){
  return shuffle(curList.filter(x=>x.w!==item.w)).slice(0,n);
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ════════════════════════════════════
//  SPEECH (Web Speech API)
// ════════════════════════════════════
function setBestVoices(){
  if(!('speechSynthesis' in window)) return;
  englishVoices = window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en'));
}
function getBestVoice(){
  if(!englishVoices.length) return null;
  for(const name of ['Samantha','Daniel','Alex','Karen','Google US English','Microsoft Aria Online','Microsoft Jenny Online']){
    const v = englishVoices.find(v=>v.name.includes(name));
    if(v) return v;
  }
  return englishVoices.find(v=>v.lang.toLowerCase()==='en-us') || englishVoices[0];
}
if('speechSynthesis' in window){
  setBestVoices();
  window.speechSynthesis.onvoiceschanged = setBestVoices;
}
function speak(word, btn){
  if(!('speechSynthesis' in window)) return;
  if(speakTimer){ clearTimeout(speakTimer); speakTimer=null; }
  try{ window.speechSynthesis.cancel(); }catch(e){}
  isSpeaking=false;
  const u = new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.95; u.pitch=1; u.volume=1;
  const v=getBestVoice();
  if(v){ u.voice=v; u.lang=v.lang; }
  u.onstart=()=>{ isSpeaking=true; if(btn) btn.classList.add('playing'); };
  u.onend=()=>{ isSpeaking=false; if(btn) btn.classList.remove('playing'); };
  u.onerror=()=>{ isSpeaking=false; if(btn) btn.classList.remove('playing'); };
  speakTimer=setTimeout(()=>{ if(!isSpeaking) window.speechSynthesis.speak(u); speakTimer=null; }, 60);
}

//  INIT
// ════════════════════════════════════
buildHome();
</script>
